<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Lista</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .list-container { max-width: 1000px; width: 100%; margin: 10px auto 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 0 10px; }
        .list-item { display: flex; background: var(--card-bg); border-radius: 8px; padding: 10px; align-items: center; transition: transform 0.2s, box-shadow 0.2s; }
        .list-item:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .list-item img { width: 60px; height: 90px; border-radius: 4px; margin-right: 15px; object-fit: cover; cursor: pointer; transition: opacity 0.2s; }
        .list-item img:hover { opacity: 0.8; box-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }
        .list-item-content { flex-grow: 1; text-align: left; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .list-item h3 { margin: 0 0 5px 0; font-size: 1.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item p { margin: 0; color: #aaa; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-actions { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; min-width: 60px; height: 90px; }
        .list-item-rating { font-size: 1.2em; font-weight: bold; color: #ffc107; cursor: pointer; text-align: right; }
        
        .action-icon { background: none; border: none; font-size: 1.2em; cursor: pointer; opacity: 0.6; transition: all 0.2s; padding: 5px; line-height: 1; }
        .action-icon:hover { opacity: 1; transform: scale(1.2); }
        
        .mark-seen-btn { background-color: var(--success-color); color: white; border: none; border-radius: 4px; padding: 5px 8px; font-size: 0.75em; cursor: pointer; transition: filter 0.2s; white-space: nowrap; }
        .mark-seen-btn:hover { filter: brightness(1.2); }
        .trailer-link { color: #8bc34a; font-size: 0.8em; text-decoration: none; cursor: pointer; margin-top: 4px; display: inline-block; }
        .trailer-link:hover { text-decoration: underline; }

        .view-toggle { display: flex; justify-content: center; gap: 10px; margin-top: 20px; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 8px; }
        .view-toggle button { background-color: transparent; color: #aaa; border: 1px solid #444; }
        .view-toggle button.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
        
        .search-container { max-width: 1000px; width: 100%; margin: 10px auto; display: none; padding: 0 10px; flex-direction: column; gap: 10px; }
        .search-top-row { display: flex; gap: 10px; }
        .search-container input { flex-grow: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid #444; background-color: #141414; color: white; font-size: 1rem; transition: border-color 0.3s; }
        .search-container input:focus { outline: none; border-color: var(--accent-color); }
        .filters-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .filters-row select { flex: 1; min-width: 120px; padding: 10px; border-radius: 8px; border: 1px solid #444; background-color: #222; color: white; font-size: 0.9rem; cursor: pointer; }
        .filters-row select:focus { outline: none; border-color: var(--accent-color); }

        #toast { visibility: hidden; min-width: 250px; background-color: var(--accent-color); color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 0.9em; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 0 10px;">
            <h1 id="profile-name-header" style="font-size: 1.5em; margin:0;">📋 La Mia Lista</h1>
            <div style="display: flex; gap: 15px;">
                <a href="stats.html" style="color: #aaa; text-decoration: none; font-size: 0.9em;">📊 Statistiche</a>
                <a href="index.html" style="color: white; text-decoration: none; border-bottom: 1px solid var(--accent-color); font-size: 0.9em;">← Quiz</a>
            </div>
        </div>
        
        <nav id="app-nav" style="display: none; margin-top: 20px;">
            <button onclick="setTab('movies')" id="btn-movies" class="active">🎬 Film</button>
            <button onclick="setTab('tv')" id="btn-tv">📺 Serie TV</button>
        </nav>

        <div class="view-toggle" id="view-toggle" style="display: none; max-width: 1000px; margin: 20px auto 10px auto;">
            <button onclick="setView('history')" id="btn-history" class="active">Votati (Storico)</button>
            <button onclick="setView('watchlist')" id="btn-watchlist">Da Vedere (Watchlist)</button>
        </div>
        
        <div class="search-container" id="search-container">
            <div class="search-top-row">
                <input type="text" id="search-input" placeholder="Cerca titolo esatto..." onkeyup="filterList()">
                <button onclick="askManualAdd()" class="btn-primary" style="white-space: nowrap; width: auto; padding: 0 15px; font-size:0.9em; margin:0;">+ Aggiungi</button>
            </div>
            <div class="filters-row" id="filters-row">
                <select id="filter-genre" onchange="filterList()"><option value="">Tutti i Generi</option></select>
                <select id="filter-platform" onchange="filterList()">
                    <option value="">Tutte le Piattaforme</option>
                    <option value="Netflix">Netflix</option>
                    <option value="Prime Video">Prime Video</option>
                    <option value="Disney+">Disney+</option>
                    <option value="Now TV">Now TV</option>
                </select>
                <select id="filter-rating" onchange="filterList()">
                    <option value="">Tutti i Voti</option>
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="1">⭐</option>
                    <option value="partial">⏳ Abbandonati</option>
                </select>
            </div>
        </div>
    </header>

    <main id="app-main" style="display: none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="loading" style="margin-top: 20px;">Caricamento...</div>
        <div id="empty-state" style="display: none; margin-top: 40px; text-align: center;">
            <h2 id="empty-text">Nessun titolo trovato.</h2>
        </div>
        <div id="list-output" class="list-container"></div>
    </main>

    <div id="toast">Copiato negli appunti!</div>

    <script src="list.js"></script>
</body>
</html>
