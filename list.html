<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Lista</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .list-container {
            max-width: 1000px;
            width: 100%;
            margin: 10px auto 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 0 10px;
        }

        .list-item {
            display: flex;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 10px;
            align-items: center;
            margin-bottom: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .list-item img {
            width: 60px;
            height: 90px;
            border-radius: 4px;
            margin-right: 15px;
            object-fit: cover;
        }

        .list-item-content {
            flex-grow: 1;
            text-align: left;
            overflow: hidden;
        }

        .list-item h3 { 
            margin: 0 0 5px 0; 
            font-size: 1.05em; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item p { 
            margin: 0; 
            color: #aaa; 
            font-size: 0.85em; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item-rating {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffc107;
            min-width: 50px;
            text-align: right;
            cursor: pointer;
        }

        .watchlist-item {
            flex-direction: column;
            align-items: flex-start;
            padding: 15px;
        }
        .watchlist-item h3 {
            white-space: normal;
            word-break: break-word;
        }
        .watchlist-item p {
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
        }

        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }
        .view-toggle button {
            background-color: transparent;
            color: #aaa;
            border: 1px solid #444;
        }
        .view-toggle button.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .search-container {
            max-width: 1000px;
            width: 100%;
            margin: 10px auto;
            display: none;
            padding: 0 10px;
        }
        .search-container input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #141414;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .search-container input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 0 10px;">
            <h1 id="profile-name-header" style="font-size: 1.5em; margin:0;">📋 La Mia Lista</h1>
            <a href="index.html" style="color: white; text-decoration: none; border-bottom: 1px solid var(--accent-color); font-size: 0.9em;">← Torna al Quiz</a>
        </div>
        
        <nav id="app-nav" style="display: none; margin-top: 20px;">
            <button onclick="setTab('movies')" id="btn-movies" class="active">🎬 Film</button>
            <button onclick="setTab('tv')" id="btn-tv">📺 Serie TV</button>
        </nav>

        <div class="view-toggle" id="view-toggle" style="display: none; max-width: 1000px; margin: 20px auto 10px auto;">
            <button onclick="setView('history')" id="btn-history" class="active">Votati (Storico)</button>
            <button onclick="setView('watchlist')" id="btn-watchlist">Da Vedere (Watchlist)</button>
        </div>
        
        <!-- Riga di ricerca con pulsante Aggiungi Manuale -->
        <div class="search-container" id="search-container">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search-input" placeholder="Cerca titolo, genere o piattaforma..." onkeyup="filterList()">
                <button onclick="askManualAdd()" class="btn-primary" style="white-space: nowrap; width: auto; padding: 0 15px; font-size:0.9em; margin:0;" title="Aggiungi un titolo che non ti è uscito nel quiz">
                    + Aggiungi
                </button>
            </div>
        </div>
    </header>

    <main id="app-main" style="display: none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="loading" style="margin-top: 20px;">Caricamento dati in corso...</div>
        <div id="empty-state" style="display: none; margin-top: 40px; text-align: center;">
            <h2 id="empty-text">Nessun titolo trovato.</h2>
        </div>
        <div id="list-output" class="list-container"></div>
    </main>

    <script src="list.js"></script>
</body>
</html>
