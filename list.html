<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Lista & Watchlist</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .list-container {
            max-width: 800px;
            width: 100%;
            margin: 20px auto;
        }
        .list-item {
            display: flex;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .list-item img {
            width: 60px;
            height: 90px;
            border-radius: 4px;
            margin-right: 15px;
            object-fit: cover;
        }
        .list-item-content {
            flex-grow: 1;
            text-align: left;
        }
        .list-item h3 { margin: 0 0 5px 0; font-size: 1.1em; }
        .list-item p { margin: 0; color: #aaa; font-size: 0.9em; }
        .list-item-rating {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffc107;
            min-width: 60px;
            text-align: right;
        }
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }
        .view-toggle button {
            background-color: transparent;
            color: #aaa;
            border: 1px solid #444;
        }
        .view-toggle button.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto;">
            <h1>📋 I Miei Titoli</h1>
            <a href="index.html" style="color: white; text-decoration: none; border-bottom: 1px solid var(--accent-color);">← Torna al Quiz</a>
        </div>
        
        <nav id="app-nav" style="display: none; margin-top: 20px;">
            <button onclick="setTab('movies')" id="btn-movies" class="active">🎬 Film</button>
            <button onclick="setTab('tv')" id="btn-tv">📺 Serie TV</button>
        </nav>

        <div class="view-toggle" id="view-toggle" style="display: none;">
            <button onclick="setView('history')" id="btn-history" class="active">Votati (Storico)</button>
            <button onclick="setView('watchlist')" id="btn-watchlist">Da Vedere (Watchlist AI)</button>
        </div>
    </header>

    <main id="app-main" style="display: none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="loading" style="margin-top: 20px;">Caricamento dati in corso...</div>
        <div id="empty-state" style="display: none; margin-top: 40px; text-align: center;">
            <h2>Nessun titolo in questa sezione.</h2>
        </div>
        <div id="list-output" class="list-container"></div>
    </main>

    <script src="list.js"></script>
</body>
</html>
